status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  #cname: demo.upptime.js.org
  baseUrl: /platform-monitoring

  # PDSSP organization logo (GitHub avatar)
  logoUrl: https://avatars.githubusercontent.com/u/82669870?s=200&v=4

  # Favicon
  faviconSvg: https://avatars.githubusercontent.com/u/82669870?s=200&v=4

  # Name displayed in the header
  name: PDSSP Platform Status

  # Custom theme file — place this file in the assets/ directory of your repo
  # See assets/pdssp-theme.css below
  themeUrl: https://pdssp.github.io/platform-monitoring/pdssp-theme.css

  # Introduction
  introTitle: "**PDSSP** — Platform Services Status"
  introMessage: >
    Real-time monitoring dashboard for the STAC Planet services of the Planetary
    Surface Data and Services Hub (PDSSP / CNES / INSU). Automatically updated every
    5 minutes via GitHub Actions.

  # Navigation bar
  navbar:
    - title: Status
      href: /
    - title: Dashboard
      href: https://pdssp.github.io/monitoring-dashboard/dashboard.html      
    - title: PDSSP
      href: https://pdssp.github.io
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

  # Inject Google Fonts in <head>
  customHeadHtml: '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">'


