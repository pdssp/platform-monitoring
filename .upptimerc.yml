owner: pdssp                 # Your GitHub organization or username, where this repository lives
repo: platform-monitoring    # The name of this repository

sites:
  - name: Keycloak authentification
    url: https://auth.157.136.252.249.nip.io
    maxResponseTime: 3000  
 
  - name: Grafana monitoring
    url: https://grafana.157.136.252.249.nip.io
    maxResponseTime: 3000  
 
  - name: XYZ Rosetta
    url: https://xyz-rosetta.157.136.252.249.nip.io
    maxResponseTime: 1000  
 
  - name: SFEOS
    url: https://stac.157.136.252.249.nip.io
    maxResponseTime: 2000  
 
  - name: STAC Planet UI
    url: https://stacplanet.157.136.252.249.nip.io
    maxResponseTime: 3000  
 
  - name: Antflow
    url: https://antflow.157.136.252.249.nip.io
